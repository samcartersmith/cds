secure:
  required_reviews: 1
  branches:
    - master
    - alpha-reanimated
build:
  engines:
    # Apps
    - BaldurECR:
        name: cds-website-docs
        path: ./apps/website/production.Dockerfile
    - BaldurECR:
        name: cds-website-docs-development
        path: ./apps/website/development.Dockerfile
    - BaldurECR:
        name: cds-css-upload-development
        path: ./packages/web/cssupload-development.Dockerfile
    - BaldurECR:
        name: cds-css-upload
        path: ./packages/web/cssupload-production.Dockerfile
    - BaldurECR:
        name: cds-storybook
        path: ./apps/storybook/production.Dockerfile
    # Packages
    - BaldurNode:
        name: package-cds-common
        path: ./packages/common/publish.Dockerfile
    - BaldurNode:
        name: package-cds-fonts
        path: ./packages/fonts/publish.Dockerfile
    - BaldurNode:
        name: package-cds-lottie-files
        path: ./packages/lottie-files/publish.Dockerfile
    - BaldurNode:
        name: package-cds-mobile
        path: ./packages/mobile/publish.Dockerfile
    - BaldurNode:
        name: package-d3
        path: ./packages/d3/publish.Dockerfile
    - BaldurNode:
        name: package-ui-mobile-a11y-engine
        path: ./packages/ui-mobile-a11y-engine/publish.Dockerfile
    - BaldurNode:
        name: package-ui-mobile-playground
        path: ./packages/ui-mobile-playground/publish.Dockerfile
    - BaldurNode:
        name: package-ui-scorecard
        path: ./packages/ui-scorecard/publish.Dockerfile
    - BaldurNode:
        name: package-cds-utils
        path: ./packages/utils/publish.Dockerfile
    - BaldurNode:
        name: package-cds-web
        path: ./packages/web/publish.Dockerfile
    - BaldurNode:
        name: package-cds-web-esm
        path: ./packages/web/publish-esm.Dockerfile
