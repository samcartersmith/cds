secure:
  required_reviews: 1
  codeowners_enabled: true
  branches:
    - master
    - v7
  auto_assign_reviewers: true
build:
  engines:
    # Apps
    - BaldurECR:
        name: cds-next-docs
        path: ./apps/docs/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-storybook
        path: ./apps/storybook2/production.Dockerfile
        autobuild: true
    # Packages
    - BaldurNode:
        name: package-cds-common
        path: ./packages/cds-common2/publish.Dockerfile
        autobuild_files:
          - packages/cds-common2/package.json
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-fonts
        path: ./packages/fonts/publish.Dockerfile
        autobuild_files:
          - packages/fonts/package.json
        expire_keep_tags_after_days: 1
