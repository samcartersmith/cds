secure:
  required_reviews: 1
  branches:
    - master
    - alpha-fabric-arch
    - release-5.0.0.rc1
    - release-5.0.0-rc.x
    - deprecations-q12023
build:
  engines:
    # Apps
    - BaldurECR:
        name: cds-website-docs
        path: ./apps/website/production.Dockerfile
    - BaldurECR:
        name: cds-website-docs-development
        path: ./apps/website/development.Dockerfile
    - BaldurECR:
        name: cds-css-upload-development
        path: ./packages/web/cssupload-development.Dockerfile
    - BaldurECR:
        name: cds-css-upload
        path: ./packages/web/cssupload-production.Dockerfile
    - BaldurECR:
        name: cds-storybook
        path: ./apps/storybook/production.Dockerfile
    # Packages
    - BaldurNode:
        name: package-cds-docusaurus-plugin-kbar
        path: ./packages/docusaurus-plugin-kbar/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-docusaurus-theme
        path: ./packages/docusaurus-theme/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-common
        path: ./packages/common/publish.Dockerfile
    - BaldurNode:
        name: package-cds-fonts
        path: ./packages/fonts/publish.Dockerfile
    - BaldurNode:
        name: package-cds-icons
        path: ./packages/icons/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1 # the number of days to keep a master build after it has been successfully deployed. There's no reason to republish a package, so this value is 1.
        expire_tmp_tags_after_days: 1 # the number of days to keep a master build. Since builds are manual for packages, publishing should happen quickly after a build, so this value is 1.
        expire_all_after_days: 2 # the number of days to keep any other build tags. This should be unused, but it's set to 2 so if it breaks something it's easier to identify that this is what caused it.
    - BaldurNode:
        name: package-cds-illustrations
        path: ./packages/illustrations/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-lottie-files
        path: ./packages/lottie-files/publish.Dockerfile
    - BaldurNode:
        name: package-cds-migrator
        path: ./packages/cds-migrator/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-mobile
        path: ./packages/mobile/publish.Dockerfile
    - BaldurNode:
        name: package-d3
        path: ./packages/d3/publish.Dockerfile
    - BaldurNode:
        name: package-ui-mobile-playground
        path: ./packages/ui-mobile-playground/publish.Dockerfile
    - BaldurNode:
        name: package-ui-scorecard
        path: ./packages/ui-scorecard/publish.Dockerfile
        autobuild: false
    - BaldurNode:
        name: package-cds-utils
        path: ./packages/utils/publish.Dockerfile
    - BaldurNode:
        name: package-cds-web
        path: ./packages/web/publish.Dockerfile
    - BaldurNode:
        name: package-cds-web-esm
        path: ./packages/web/publish-esm.Dockerfile
    - BaldurNode:
        name: package-cds-tasks
        path: ./packages/cds-tasks/publish.Dockerfile
        autobuild: false
        compute_type: BUILD_GENERAL1_SMALL
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
