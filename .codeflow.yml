secure:
  required_reviews: 1
  codeowners_enabled: true
  branches:
    - master
    - v5
    - v6
    - 6.47.4
    - 7.0.0-rc.0
    - 8.0.0-alpha-mobile
    - 8.0.0-alpha.1
  auto_assign_reviewers: true
build:
  engines:
    # CSS
    - BaldurECR:
        name: cds-css-upload
        path: ./packages/web/cssupload-production.Dockerfile
        autobuild_files:
          - packages/web/package.json
    - BaldurECR:
        name: cds-css-upload-development
        path: ./packages/web/cssupload-development.Dockerfile
        autobuild_files:
          - packages/web/package.json

    # Apps
    - BaldurECR:
        name: cds-next-docs
        path: ./apps/docs/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-storybook
        path: ./apps/storybook/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-website-docs
        path: ./apps/website/production.Dockerfile
        autobuild: true
    - BaldurECR:
        name: cds-website-docs-development
        path: ./apps/website/development.Dockerfile
        autobuild: false
    - BaldurECR:
        name: figma-athena
        path: ./apps/figma-athena-plugin/Dockerfile
        autobuild: false

    # Packages
    - BaldurNode:
        name: package-cds-common
        path: ./packages/common/publish.Dockerfile
        autobuild_files:
          - packages/common/package.json
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
    - BaldurNode:
        name: package-cds-fonts
        path: ./packages/fonts/publish.Dockerfile
        autobuild_files:
          - packages/fonts/package.json
        expire_keep_tags_after_days: 1
        expire_tmp_tags_after_days: 1
        expire_all_after_days: 2
