name: MobilePlayground
configs:
  Debug: debug
  Release: release
targets:
  MobilePlayground:
    type: application
    platform: iOS
    deploymentTarget: '14.0'
    sources:
      - path: MobilePlayground
        compilerFlags:
          - '-fstack-protector-all'
    settings:
      base:
        APP_VERSION: '1.0.0'
        BUILD_NUMBER: '001'
        CURRENT_PROJECT_VERSION: '001'
        TARGETED_DEVICE_FAMILY: 1 # support iPhone/iPod touch only
        SWIFT_VERSION: 5.0
        ENABLE_BITCODE: false
        CODE_SIGN_STYLE: Manual
        PRODUCT_NAME: 'MobilePlayground'
        APP_DISPLAY_NAME: MobilePlayground
        PRODUCT_BUNDLE_IDENTIFIER: com.coinbase.mobileplayground
      configs:
        Debug:
          DEBUG: true
        Release:
          DEBUG: false
          # RELEASE_STAGE: production
          ENABLE_BITCODE: true
    postBuildScripts:
      - name: Bundle React Native code and images
        script: |
          set -e
          export NODE_BINARY=node
          export PROJECT_ROOT="$PWD/.."
          ../../../node_modules/react-native/scripts/react-native-xcode.sh
