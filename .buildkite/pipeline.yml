env:
  LANG: en_US.UTF-8
  CI: true
  NX_CAPTURE_METRICS: true
  NX_CAPTURE_TEST_METRICS: true
  NX_ENABLE_REMOTE_CACHE: true

_docker_shared: &docker_shared
  plugins:
    - file:///buildkite/plugins/docker:
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v18
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - 'BUILDKITE_API_TOKEN'
          - 'PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1'
          - 'BUILDKITE_PIPELINE_SLUG'
          - 'BUILDKITE_PLUGIN_CACHE_S3_BUCKET'
          - 'AWS_ACCESS_KEY_ID'
          - 'AWS_SECRET_ACCESS_KEY'
          - 'AWS_SESSION_TOKEN'
    - file:///buildkite/plugins/cache: &cache_plugin
        key: yarn-node-modules-{{ checksum "yarn.lock" }}-v1
        paths:
          - ./.yarn/cache
          - ./.yarn/install-state.gz

_k8s_medium: &k8s_medium
  <<: *docker_shared
  agents:
    queue: k8s-docker
    agent-size: medium

_k8s_large: &k8s_large
  <<: *docker_shared
  agents:
    queue: k8s-docker
    agent-size: large

_docker_chrome: &docker_chrome
  env:
    CONFIG_SERVICE_CONTEXT: percy-cds
    STORYBOOK_SKIP_ANIMATION: true
  plugins:
    - file:///buildkite/plugins/docker:
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v18-chrome
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - 'BUILDKITE_API_TOKEN'
          - 'PERCY_TOKEN'
          - 'STORYBOOK_SKIP_ANIMATION'
          - 'BUILDKITE_PIPELINE_SLUG'
          - 'BUILDKITE_PLUGIN_CACHE_S3_BUCKET'
          - 'AWS_ACCESS_KEY_ID'
          - 'AWS_SECRET_ACCESS_KEY'
          - 'AWS_SESSION_TOKEN'
    - file:///buildkite/plugins/cache: *cache_plugin

_k8s_medium_chrome: &k8s_medium_chrome
  <<: *docker_chrome
  agents:
    queue: k8s-docker
    agent-size: medium

_k8s_large_chrome: &k8s_large_chrome
  <<: *docker_chrome
  agents:
    queue: k8s-docker
    agent-size: large

steps:
  - label: Validate
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline validate-codeflow
      - yarn mono-pipeline validate-codeowners
      - yarn mono-pipeline validate-lockfile
      - yarn mono-pipeline validate-versioned --projectsWithNoSrcFolder='web,mobile,common'
      - yarn mono-pipeline validate-package-jsons
      - yarn mono-pipeline validate-patches
      - yarn nx run cds-tasks:validate-cds-versions
      - yarn nx run cds-tasks:validate-website-changelog-updates
      - yarn constraints || exit 1

  - label: Build
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci build --exclude=mobile-app --allOnMaster

  - label: Lint
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci lint --allOnMaster

  - label: Format
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci format --allOnMaster

  - label: Test
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci test --allOnMaster
      - yarn mono-pipeline run-ci other --targets=audit-a11y --allOnMaster
    retry:
      automatic:
        limit: 1

  - label: Typecheck
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci typecheck --allOnMaster

  - label: Danger
    <<: *k8s_medium
    parallelism: 1
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci danger --allOnMaster
    soft_fail: true

  - label: 'Percy (Web)'
    <<: *k8s_large_chrome
    cancel_on_build_failing: true
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-percy storybook
      - yarn mono-pipeline run-ci other --targets=a11y-web --allOnMaster
    retry:
      automatic:
        limit: 1

  - label: 'Percy (Mobile - All)'
    <<: *k8s_medium
    if: build.branch == 'master' || build.pull_request.labels includes 'visreg'
    env:
      DETOX_RUN_ALL: true
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --targets=visreg --allOnMaster

  - label: 'Percy (Mobile - Affected)'
    <<: *k8s_medium
    if: build.branch != 'master' && !(build.pull_request.labels	includes 'visreg')
    commands:
      - tools/ci/setup.sh
      - (yarn workspace mobile-app should-run-visreg && yarn mono-pipeline run-ci other --targets=visreg --allOnMaster) || echo 'Skipping Percy (Mobile)'

  - label: 'Storybook E2E Test'
    <<: *k8s_medium_chrome
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --projects=storybook --targets=storybook-e2e-test --allOnMaster
    retry:
      automatic:
        limit: 1

  - label: 'Bundle Size'
    <<: *k8s_medium_chrome
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --projects=storybook --targets=analyze-bundle --allOnMaster
    retry:
      automatic:
        limit: 1
