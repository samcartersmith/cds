env:
  LANG: en_US.UTF-8
  CI: true
  NX_CAPTURE_METRICS: true
  NX_CAPTURE_TEST_METRICS: true
  NX_ENABLE_REMOTE_CACHE: true

_docker_shared: &docker_shared
  plugins:
    - file:///buildkite/plugins/docker:
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v20-ub22
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - 'BUILDKITE_API_TOKEN'
          - 'PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1'
          - 'BUILDKITE_PIPELINE_SLUG'
          - 'BUILDKITE_PLUGIN_CACHE_S3_BUCKET'
          - 'AWS_ACCESS_KEY_ID'
          - 'AWS_SECRET_ACCESS_KEY'
          - 'AWS_SESSION_TOKEN'
    - file:///buildkite/plugins/cache: &cache_plugin_yarn
        key: yarn-node-modules-{{ checksum "yarn.lock" }}-v1
        paths:
          - ./.yarn/cache
          - ./.yarn/install-state.gz
    # Buildkite cache config for bundle-stats and export-stats https://github.cbhq.net/infra/buildkite/pull/126
    - file:///buildkite/plugins/cache:
        key: bundle-stats-v1
        path: bundle-stats.json
        download_blocklist_keys:
          - bundle-stats-master
        upload_allowlist_keys:
          - bundle-stats-master
    - file:///buildkite/plugins/cache:
        key: export-stats-v1
        path: export-stats.md
        download_blocklist_keys:
          - export-stats-master
        upload_allowlist_keys:
          - export-stats-master
    - file:///buildkite/plugins/cache:
        key: depcheck-v1
        path: depcheck-results.md
        download_blocklist_keys:
          - depcheck-master
        upload_allowlist_keys:
          - depcheck-master

_k8s_medium: &k8s_medium
  <<: *docker_shared
  agents:
    queue: k8s-docker
    agent-size: medium

_k8s_large: &k8s_large
  <<: *docker_shared
  agents:
    queue: k8s-docker
    agent-size: large

_docker_chrome: &docker_chrome
  env:
    CONFIG_SERVICE_CONTEXT: percy-cds
    STORYBOOK_SKIP_ANIMATION: true
  plugins:
    - file:///buildkite/plugins/docker:
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v20-chrome-ub22
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - 'BUILDKITE_API_TOKEN'
          - 'PERCY_TOKEN'
          - 'STORYBOOK_SKIP_ANIMATION'
          - 'BUILDKITE_PIPELINE_SLUG'
          - 'BUILDKITE_PLUGIN_CACHE_S3_BUCKET'
          - 'AWS_ACCESS_KEY_ID'
          - 'AWS_SECRET_ACCESS_KEY'
          - 'AWS_SESSION_TOKEN'
    - file:///buildkite/plugins/cache: *cache_plugin_yarn

_k8s_medium_chrome: &k8s_medium_chrome
  <<: *docker_chrome
  agents:
    queue: k8s-docker
    agent-size: medium

_k8s_large_chrome: &k8s_large_chrome
  <<: *docker_chrome
  agents:
    queue: k8s-docker
    agent-size: large

steps:
  - label: Validate
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline validate-codeflow
      - yarn mono-pipeline validate-codeowners
      - yarn mono-pipeline validate-lockfile
      - yarn mono-pipeline validate-package-jsons
      - yarn mono-pipeline validate-patches
      - yarn mono-pipeline validate-versioned
      - yarn tsx ./tools/validateCDSVersions.ts
      - yarn tsx ./tools/validateWebsiteChangelogUpdates.ts
      - yarn constraints || exit 1

  - label: Build
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci build --exclude=mobile-app,mobile-app2 --allOnMaster --verbose

  - label: Lint
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci lint --allOnMaster

  - label: Format
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci format --allOnMaster

  - label: Test
    <<: *k8s_large
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci test --allOnMaster
      - yarn mono-pipeline run-ci other --targets=audit-a11y --allOnMaster
    retry:
      automatic:
        limit: 1

  - label: Typecheck
    <<: *k8s_medium
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci typecheck --allOnMaster

  - label: Danger
    <<: *k8s_medium
    parallelism: 1
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci danger --allOnMaster --removePreviousComments

  - label: 'Visreg (Web - All)'
    <<: *k8s_large_chrome
    if: build.branch == 'master' || build.pull_request.labels includes 'visreg'
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-percy storybook
    retry:
      automatic:
        limit: 1

  - label: 'Visreg (Web - Affected)'
    <<: *k8s_large_chrome
    if: build.branch != 'master' && !(build.pull_request.labels	includes 'visreg')
    commands:
      - tools/ci/setup.sh
      - (yarn workspace @cds/storybook should-run-visreg && yarn mono-pipeline run-percy storybook) || echo 'Skipping Percy (Web)'
    retry:
      automatic:
        limit: 1

  - label: 'Visreg (Mobile - All)'
    <<: *k8s_medium
    if: build.branch == 'master' || build.pull_request.labels includes 'visreg'
    env:
      DETOX_RUN_ALL: true
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --targets=visreg --allOnMaster

  - label: 'Visreg (Mobile - Affected)'
    <<: *k8s_medium
    if: build.branch != 'master' && !(build.pull_request.labels	includes 'visreg')
    commands:
      - tools/ci/setup.sh
      - (yarn workspace mobile-app should-run-visreg && yarn mono-pipeline run-ci other --targets=visreg --allOnMaster) || echo 'Skipping Percy (Mobile)'

  - label: 'Storybook A11y'
    <<: *k8s_medium_chrome
    commands:
      - tools/ci/setup.sh
      - yarn nx affected --target=a11y-web
    retry:
      automatic:
        limit: 1

  - label: 'Storybook E2E'
    <<: *k8s_medium_chrome
    commands:
      - tools/ci/setup.sh
      - yarn nx affected --target=storybook-e2e-test
    retry:
      automatic:
        limit: 1

  - label: 'Bundle Stats (Master)'
    <<: *k8s_large
    key: bundle-stats-master
    if: build.branch == 'master'
    commands:
      - tools/ci/setup.sh
      - yarn nx run storybook:build-for-analyze

  - label: 'Bundle Stats'
    <<: *k8s_large
    if: build.branch != 'master'
    env:
      ANALYZE_REPORT_PATH: apps/storybook/bundle-stats.json
    commands:
      - tools/ci/setup.sh
      - yarn nx run storybook:analyze-bundle || echo 'Failed to analyze bundle'

  - label: 'Profile Exports (Master)'
    <<: *k8s_large
    key: export-stats-master
    if: build.branch == 'master'
    commands:
      - tools/ci/setup.sh
      - yarn nx run storybook:profile-exports
    skip: true

  - label: 'Profile Exports'
    <<: *k8s_large
    if: build.branch != 'master'
    env:
      PROFILE_EXPORTS_DIFF: true
    commands:
      - tools/ci/setup.sh
      - yarn nx run storybook:profile-exports || echo 'Failed to profile exports'
    skip: true

  - label: 'Depcheck (Master)'
    <<: *k8s_large
    key: depcheck-master
    if: build.branch == 'master'
    commands:
      - tools/ci/setup.sh
      - yarn node tools/depcheck.mjs

  - label: 'Depcheck'
    <<: *k8s_large
    if: build.branch != 'master'
    env:
      DEPCHECK_DIFF: true
    commands:
      - tools/ci/setup.sh
      - yarn node tools/depcheck.mjs || echo 'Failed to run depcheck'

  - label: 'Figma Code Connect validation'
    <<: *k8s_medium
    if: build.branch != 'master'
    commands:
      - tools/ci/setup.sh
      - yarn nx affected --target=publish-figma --dry-run
    soft_fail: true
