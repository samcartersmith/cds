env:
  LANG: en_US.UTF-8
  CI: true
  NX_CAPTURE_METRICS: true
  NX_CAPTURE_TEST_METRICS: true

_shared_step: &shared_step
  plugins:
    - file:///buildkite/plugins/docker: &docker_plugin
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v18
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - 'BUILDKITE_API_TOKEN'
    - file:///buildkite/plugins/cache: &cache_plugin
        key: yarn-node-modules-{{ checksum "yarn.lock" }}-v1
        paths:
          - ./.yarn/cache
          - ./.yarn/install-state.gz
  agents:
    queue: docker
    resource_class: large
  retry:
    automatic:
      limit: 1

_chrome_step: &chrome_step
  <<: *shared_step
  env:
    CONFIG_SERVICE_CONTEXT: percy-cds
    STORYBOOK_SKIP_ANIMATION: true
  plugins:
    - file:///buildkite/plugins/docker:
        <<: *docker_plugin
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v18-chrome
        environment:
          - 'BUILDKITE_API_TOKEN'
          - 'PERCY_TOKEN'
          - 'STORYBOOK_SKIP_ANIMATION'
    - file:///buildkite/plugins/cache: *cache_plugin

steps:
  - label: Validate
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline validate-codeowners
      - yarn mono-pipeline validate-lockfile
      - yarn mono-pipeline validate-versioned
      - yarn mono-pipeline validate-patches
      - yarn mono-pipeline run-ci other --targets=validate-cds-versions
      - yarn mono-pipeline run-ci other --targets=validate-website-changelog-updates

  - label: Build
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci build

  - label: Build ESM
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      # Bundling the esm build with web:build target causes >2x computation time.
      # As a result we are running it as its own build step until we confirm that the esm build is actually needed for ssr.
      # See profile results: https://github.cbhq.net/frontend/cds/pull/1751
      - yarn mono-pipeline run-ci other --targets=build-esm

  - label: Lint
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci lint

  - label: Format
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci format

  - label: Test
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci test

  - label: Typecheck
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci typecheck

  - label: Danger
    <<: *shared_step
    parallelism: 1
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci danger
    retry:
      automatic: false
    soft_fail: true

  - label: 'Percy (Web)'
    <<: *chrome_step
    cancel_on_build_failing: true
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-percy storybook
      - yarn mono-pipeline run-ci other --targets=a11y-web

  - label: 'Percy (Mobile)'
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --targets=visreg
    retry:
      automatic: false

  - label: 'Storybook E2E Test'
    <<: *shared_step
    commands:
      - tools/ci/setup.sh
      - yarn mono-pipeline run-ci other --targets=storybook-e2e-test
    retry:
      automatic: false
