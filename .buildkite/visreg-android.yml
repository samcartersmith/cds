_prebuild_shared_step: &prebuild_shared_step
  plugins:
    - file:///buildkite/plugins/cache: &cache_plugin
        key: yarn-node-modules-{{ checksum "yarn.lock" }}-v1
        paths:
          - ./.yarn/cache
          - ./.yarn/install-state.gz
    - file:///buildkite/plugins/docker: &docker_plugin
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:android
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - BUILDKITE_API_TOKEN
  timeout_in_minutes: 45
  retry:
    automatic: true
  artifact_paths:
    - 'artifacts/**/*'
  agents:
    queue: metal

_visreg_android_shared: &visreg_android_shared
  plugins: &android_plugins
    - file:///buildkite/plugins/cache: &cache_plugin
        key: yarn-node-modules-{{ checksum "yarn.lock" }}-v1
        paths:
          - ./.yarn/cache
          - ./.yarn/install-state.gz
    - file:///buildkite/plugins/docker: &docker_plugin
        image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:android
        wait-network: true
        privileged: true
        always-pull: true
        propagate-environment: true
        propagate-uid-gid: true
        volumes:
          # Allow git operations to work
          - ${HOME}/.ssh:/root/.ssh
          - ${HOME}/.git:/root/.git
        environment:
          - PLAYSTORE_AUTH
          - KEY_PASSWORD
          - KEY_ALIAS
          - BUGSNAG_KEY
          - ANDROID_KEYSTORE
          - PLAYSTORE_PACKAGE_NAME
          - PERCY_TOKEN
          - PERCY_TARGET_BRANCH
    - ssh://git@github.cbhq.net/frontend/aws-sm-buildkite-plugin:
        env:
          PERCY_TOKEN: infra/buildkite/cds-percy-token-android
  timeout_in_minutes: 60
  agents:
    queue: metal
  retry:
    automatic:
      limit: 2

env:
  LANG: en_US.UTF-8
  CI: true
  NX_CAPTURE_METRICS: true
  NX_CAPTURE_TEST_METRICS: true
  ANDROID_NDK_HOME: '$$ANDROID_HOME/ndk/$$NDK_VERSION'
  PERCY_TOKEN_SECRET_ID: 'infra/buildkite/cds-percy-token-android'

steps:
  - label: Android - Prebuild - visreg
    key: 'visreg_android_prebuild'
    <<: *prebuild_shared_step
    commands:
      - export SYSTEM_VERSION_COMPAT=0
      - tools/ci/setup.sh
      - mkdir -p $(pwd)/artifacts
      - yarn nx run mobile-playground:prebuild-android-e2e cds-playground --destination $(pwd)/artifacts/cds-playground-android-app.tar.gz

  - label: 'Visreg Test (Android) %n'
    <<: *visreg_android_shared
    cancel_on_build_failing: true
    depends_on: 'visreg_android_prebuild'
    key: 'visreg_android'
    parallelism: 8
    commands:
      - 'tools/ci/visreg-android.sh artifacts/cds-playground-android-app.tar.gz'

  - label: 'Finish Visreg Tests (Android)'
    allow_dependency_failure: true
    depends_on: 'visreg_android'
    parallelism: 1
    agents:
      queue: macos-metal
    commands:
      - export PERCY_TOKEN=$(aws secretsmanager get-secret-value --secret-id $$PERCY_TOKEN_SECRET_ID --query SecretString --output text)
      - tools/ci/visreg-finalize.sh
