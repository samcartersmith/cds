name: 'CDS Adoption Tracker'
description: 'Tracks and analyzes CDS components in a repository'

inputs:
  project-name:
    description: 'Name of the project for analytics'
    required: true
  tsconfig-path:
    description: 'Path to tsconfig.json file'
    required: true
  package-json-path:
    description: 'Path to package.json file'
    required: true
    default: ''

runs:
  using: 'node20'
  main: 'dist/index.js'
