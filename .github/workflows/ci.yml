name: CI
on:
  push:
    branches: master
  pull_request:
    branches: master

concurrency:
  group: CI-${{github.ref_name}}-${{github.event.pull_request.number || github.sha}}
  cancel-in-progress: ${{github.event_name == 'pull_request'}}

env:
  CI: true
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  NX_SELF_HOSTED_REMOTE_CACHE_SERVER: 'https://nx-remote-cache.cbhq.net'

jobs:
  validate:
    name: Validate
    runs-on: [medium, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Validate Codeflow
        run: yarn mono-pipeline validate-codeflow
      - name: Validate Codeowners
        run: yarn mono-pipeline validate-codeowners
      - name: Validate Lockfile
        run: yarn mono-pipeline validate-lockfile
      - name: Validate Package JSONs
        run: yarn mono-pipeline validate-package-jsons
      - name: Validate Patches
        run: yarn mono-pipeline validate-patches
      - name: Validate Versioned
        run: yarn mono-pipeline validate-versioned
      - name: Validate CDS Versions
        run: yarn tsx ./tools/validateCDSVersions.ts
      - name: Validate Constraints
        run: yarn constraints || exit 1

  lint:
    name: Lint
    runs-on: [large, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Lint
        run: yarn nx affected --target=lint --base=$NX_BASE --head=$NX_HEAD --exclude=migrator # Temporarily disable cds-migrator linting

  format:
    name: Format
    runs-on: [medium, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Format
        run: yarn nx format:check  --verbose --base=$NX_BASE --head=$NX_HEAD

  test:
    name: Test
    runs-on: [xlarge, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Test
        run: |
          yarn nx affected --target=test --base=$NX_BASE --head=$NX_HEAD
          yarn nx affected --target=audit-a11y --base=$NX_BASE --head=$NX_HEAD

  typecheck:
    name: Typecheck
    runs-on: [medium, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Typecheck
        run: yarn nx affected --target=typecheck --base=$NX_BASE --head=$NX_HEAD

  build:
    name: Build
    runs-on: [xlarge, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - name: Build
        run: yarn nx affected --exclude=mobile-app --target=build --base=$NX_BASE --head=$NX_HEAD

  storybook-a11y:
    if: ${{ github.event_name == 'pull_request' }}
    name: Storybook A11y
    runs-on: [medium, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup
      - uses: infra/cb-action-docker@master
        with:
          image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v20-chrome-ub22
          command: |-
            yarn nx affected --target=a11y-web
          environment: |-
            STORYBOOK_SKIP_ANIMATION=true
            CI=true

  # storybook-e2e:
  #   if: ${{ github.event_name == 'pull_request' }}
  #   name: Storybook E2E
  #   runs-on: [medium, amd64]
  #   env:
  #     PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 0
  #   steps:
  #     - uses: actions/checkout@v4
  #       with:
  #         fetch-depth: 100 # TODO: This needs to include the merge-base
  #     - uses: ./.github/actions/setup
  #     - uses: infra/cb-action-docker@master
  #       with:
  #         image: 652969937640.dkr.ecr.us-east-1.amazonaws.com/containers/node:v20-chrome-ub22
  #         command: |-
  #           npx playwright install --with-deps
  #           yarn nx affected --target=storybook-e2e-test
  #         environment: |-
  #           STORYBOOK_SKIP_ANIMATION=true
  #           CI=true

  depcheck:
    name: Depcheck
    runs-on: [medium, amd64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 100 # TODO: This needs to include the merge-base
      - uses: ./.github/actions/setup

      # Get the merge-base SHA for cache key (PR only)
      - name: Get merge-base SHA
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/get-merge-base
        id: get-merge-base

      # For PRs: Try to restore cache using merge-base SHA
      - name: Restore depcheck baseline (PR)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        id: cache-depcheck
        with:
          path: depcheck-results.md
          key: depcheck-master-${{ steps.get-merge-base.outputs.merge_base }}

      # For PRs: Fail with clear message if no baseline found
      - name: Check for baseline file (PR)
        if: github.event_name == 'pull_request' && steps.cache-depcheck.outputs.cache-hit != 'true'
        run: |
          echo "::error::ERROR: Depcheck baseline not found for merge-base SHA ${{ steps.get-merge-base.outputs.merge_base }}. This may happen if the merge-base commit doesn't have a cached baseline yet. Please ensure the base branch has run the depcheck job."
          exit 1

      # Run depcheck in the appropriate mode based on event type
      - name: Run Depcheck
        env:
          DEPCHECK_DIFF: ${{ github.event_name == 'pull_request' }}
        run: yarn node tools/depcheck.mjs

      # For master: Cache the results with current SHA
      - name: Cache depcheck results (Master)
        if: github.ref_name == 'master'
        uses: actions/cache/save@v4
        with:
          path: depcheck-results.md
          key: depcheck-master-${{ github.sha }}

  # Disabled until we can fix the actual profile-exports script
  # profile-exports:
  #   name: Profile Exports
  #   runs-on: [large, amd64]
  #   steps:
  #     - uses: actions/checkout@v4
